name: Stable Release
# Manual workflow to build, sign, and distribute a stable release to Telegram and GitHub Releases.

on:
  workflow_dispatch:
    # No inputs needed for now as we pull the version directly from build.gradle.kts

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating GitHub Releases

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Decode Release Keystore
        run: |
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Extract App Version
        id: get_version
        run: |
          VERSION=$(grep "version =" build.gradle.kts | head -n 1 | sed -E 's/.*version = "(.*)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          ANDROID_RELEASE_KEYSTORE: release.jks
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEYSTORE_ALIAS: ${{ secrets.ANDROID_RELEASE_KEYSTORE_ALIAS }}

      - name: Rename APK for Distribution
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          mv "$APK_PATH" "app/build/outputs/apk/release/pulse-stable-v${{ env.VERSION }}.apk"
          echo "APK_FINAL_PATH=app/build/outputs/apk/release/pulse-stable-v${{ env.VERSION }}.apk" >> $GITHUB_ENV

      - name: Upload to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Pulse: New Stable Release v${{ env.VERSION }}
            
            This is an official stable build.
            Branch: ${{ github.ref_name }}
          document: "${{ env.APK_FINAL_PATH }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Pulse Stable v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            ${{ env.APK_FINAL_PATH }}
          body: |
            Official Stable Release of Pulse v${{ env.VERSION }}.
            
            Build distributed via GitHub Actions.
